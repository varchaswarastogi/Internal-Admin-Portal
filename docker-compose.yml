services:
  postgres:
    image: postgres:16-alpine
    container_name: admin-portal-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: admin_portal
      POSTGRES_PASSWORD: admin_portal
      POSTGRES_DB: admin_portal
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin_portal -d admin_portal"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
